<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Stream | {{ file_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --dark-bg: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.7);
            --text-main: #ffffff;
            --text-muted: #8b8b99;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            text-align: center; 
            font-family: 'Inter', sans-serif; 
            background: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 0, 60, 0.15), transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 0, 60, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 0, 60, 0.05);
            max-width: 500px;
            width: 100%;
        }

        .brand {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--neon-red);
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        h2 { font-size: 18px; font-weight: 500; word-wrap: break-word; margin-bottom: 10px; line-height: 1.4; }
        .size { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; font-weight: 500; }

        /* Video Player Styling */
        .video-container {
            display: none; 
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }
        video { width: 100%; display: block; background: #000; }

        /* External Stream Buttons */
        .stream-options {
            display: none; 
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stream-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .btn-group { display: flex; gap: 10px; }
        
        .btn-app {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-app:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

        /* Main Download Button */
        .btn-main { 
            padding: 16px; 
            font-size: 16px; 
            font-weight: 600;
            background: linear-gradient(45deg, var(--neon-red), #cc0030); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.3);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 0, 60, 0.5); }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand">Infinity</div>
    <h2>{{ file_name }}</h2>
    <p class="size" id="size-text"></p>

    <!-- HTML5 Player (For MP4/WebM) -->
    <div class="video-container" id="video-container">
        <video id="video-player" controls playsinline>
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- External Streaming (For MKV/AVI) -->
    <div class="stream-options" id="stream-options">
        <div class="stream-title">Stream without downloading</div>
        <div class="btn-group">
            <a href="#" id="vlc-link" class="btn-app">▶️ VLC Player</a>
            <a href="#" id="mx-link" class="btn-app">▶️ MX Player</a>
        </div>
    </div>

    <!-- Main Download -->
    <a href="/download/{{ file_code }}" class="btn-main" id="download-btn" onclick="this.innerHTML='Initiating Transfer...'; this.style.opacity='0.8';">
        Download File
    </a>
</div>

<script>
    // 1. Format Size
    const bytes = {{ file_size }};
    const units = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
    let val = bytes;
    let unitIndex = 0;
    while (val >= 1024 && unitIndex < units.length - 1) {
        val /= 1024;
        unitIndex++;
    }
    document.getElementById('size-text').innerText = val.toFixed(2) + ' ' + units[unitIndex];

    // 2. Smart Media Detector
    const fileName = "{{ file_name }}".toLowerCase();
    const streamUrl = window.location.origin + "/download/{{ file_code }}"; // Full URL needed for external apps
    
    // If it's a browser-friendly video
    if (fileName.endsWith('.mp4') || fileName.endsWith('.webm')) {
        document.getElementById('video-container').style.display = 'block';
        document.getElementById('video-player').src = streamUrl;
        document.getElementById('download-btn').innerText = 'Download Video';
    } 
    // If it's an MKV, AVI, or HEVC (Require External Apps)
    else if (fileName.endsWith('.mkv') || fileName.endsWith('.avi') || fileName.endsWith('.hevc')) {
        document.getElementById('stream-options').style.display = 'block';
        
        // Android/iOS Deep Links
        document.getElementById('vlc-link').href = "vlc://" + streamUrl;
        
        // MX Player Intent (Android)
        document.getElementById('mx-link').href = "intent:" + streamUrl + "#Intent;package=com.mxtech.videoplayer.ad;S.title={{ file_name }};end";
        
        document.getElementById('download-btn').innerText = 'Direct Download';
    }
</script>

</body>
</html>
