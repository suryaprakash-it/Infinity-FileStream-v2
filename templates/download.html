<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Stream | {{ file_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --dark-bg: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.8);
            --text-main: #ffffff;
            --text-muted: #8b8b99;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            text-align: center; 
            font-family: 'Inter', sans-serif; 
            background: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 0, 60, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            max-width: 450px;
            width: 100%;
        }

        .brand {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--neon-red);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h2 { font-size: 16px; font-weight: 500; margin-bottom: 10px; line-height: 1.4; }
        .size { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; }

        /* Fix: Grid layout for buttons to prevent overlap */
        .video-container { display: none; margin-bottom: 20px; }
        .stream-options { display: none; margin-bottom: 20px; width: 100%; }
        
        .btn-group { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            width: 100%;
        }

        video { width: 100%; border-radius: 12px; background: #000; }

        .btn-app {
            padding: 10px 5px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-main { 
            padding: 15px; 
            font-size: 15px; 
            font-weight: 600;
            background: linear-gradient(45deg, var(--neon-red), #cc0030); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-copy { 
            padding: 12px;
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-main:hover, .btn-copy:hover, .btn-app:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand">Infinity</div>
    <h2>{{ file_name }}</h2>
    <p class="size" id="size-text"></p>

    <div class="video-container" id="video-container">
        <video id="video-player" controls playsinline></video>
    </div>

    <div class="stream-options" id="stream-options">
        <div class="btn-group" id="stream-btns"></div>
    </div>

    <a href="/download/{{ file_code }}" class="btn-main" id="download-btn">Download File</a>
    <button class="btn-copy" onclick="copyLink()">📋 Copy Share Link</button>
</div>

<script>
    // 1. Format Size
    const bytes = {{ file_size }};
    const units = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
    let val = bytes;
    let unitIndex = 0;
    while (val >= 1024 && unitIndex < units.length - 1) { val /= 1024; unitIndex++; }
    document.getElementById('size-text').innerText = val.toFixed(2) + ' ' + units[unitIndex];

    // 2. Copy Function
    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        const btn = document.querySelector('.btn-copy');
        btn.innerText = '✅ Link Copied!';
        setTimeout(() => btn.innerText = '📋 Copy Share Link', 2000);
    }

    // 3. Logic
    const fileName = "{{ file_name }}".toLowerCase();
    const streamUrl = window.location.origin + "/download/{{ file_code }}"; 
    const urlWithoutScheme = streamUrl.replace(/^https?:\/\//, '');

    // Media detection
    if (fileName.endsWith('.mp4') || fileName.endsWith('.webm')) {
        document.getElementById('video-container').style.display = 'block';
        document.getElementById('video-player').src = streamUrl;
        document.getElementById('download-btn').innerText = 'Download Video';
    } 
    else if (fileName.endsWith('.mkv') || fileName.endsWith('.avi') || fileName.endsWith('.hevc')) {
        document.getElementById('stream-options').style.display = 'block';
        document.getElementById('stream-btns').innerHTML = `
            <a href="intent://${urlWithoutScheme}#Intent;scheme=https;type=video/*;action=android.intent.action.VIEW;end" class="btn-app">📱 Choose</a>
            <a href="intent://${urlWithoutScheme}#Intent;scheme=https;type=video/*;action=android.intent.action.VIEW;package=org.videolan.vlc;end" class="btn-app">▶️ VLC</a>
            <a href="intent://${urlWithoutScheme}#Intent;scheme=https;type=video/*;action=android.intent.action.VIEW;package=com.mxtech.videoplayer.ad;end" class="btn-app">▶️ MX</a>
        `;
        document.getElementById('download-btn').innerText = 'Direct Download';
    }
</script>

</body>
</html>
